---
name: security
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      security_scan:
        description: 'Run security scan'
        required: true
        default: 'true'
        type: choice
        options:
          - pull_changes
          - npm_audit
          - synk_scan
          - tirvy_scan
          - secret_scan
          - image_scan
          - filesystem_scan
          - all

jobs:
  pull_changes:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event.inputs.security_scan == 'pull_changes' ||
      github.event.inputs.security_scan == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: clone openclaw
        run: git clone https://github.com/openclaw/openclaw.git scan-target
      - name: upload files
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-source
          path: scan-target/
  npm_audit:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event.inputs.security_scan == 'npm_audit' ||
      github.event.inputs.security_scan == 'all'
    runs-on: ubuntu-latest
    needs: pull_changes
    steps:
      - name: downcload files
        uses: actions/download-artifact@v4
        with:
          name: openclaw-source
          path: scan-target/
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd scan-target &&  npm install
      - name: scan and log file
        run: cd scan-target && npm audit >> audit.txt
        continue-on-error: true
      - name: upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-logs
          path: scan-target/audit.txt
  synk_scan:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event.inputs.security_scan == 'synk_scan' ||
      github.event.inputs.security_scan == 'all'
    runs-on: ubuntu-latest
    needs: pull_changes
    steps:
      - name: download files
        uses: actions/download-artifact@v4
        with:
          name: openclaw-source
          path: scan-target/
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: install pnpm
        run: npm install -g pnpm
      - run: cd scan-target &&  pnpm install
      - name: install snyk
        run: npm install -g snyk
      - name: run synk  scan
        run: cd scan-target && snyk test --severity-threshold=high --all-projects > snyk.txt
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SYNK.TOKEN }}
      - name: upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: synk-logs
          path: scan-target/snyk.txt
  trivy_scan:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event.inputs.security_scan == 'trivy_scan' ||
      github.event.inputs.security_scan == 'all'
    runs-on: ubuntu-latest
    needs: pull_changes
    steps:
      - name: downcload files
        uses: actions/download-artifact@v4
        with:
          name: openclaw-source
          path: scan-target/
      - name: install trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: run trivy scan
        run: trivy fs scan-target --severity HIGH,CRITICAL > trivy.txt
        continue-on-error: true
      - name: upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-logs
          path: trivy.txt

  secret_scan:
    if: >
      github.event_name == 'push' ||
      github.event.inputs.security_scan == 'secret_scan' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event.inputs.security_scan == 'all'
    runs-on: ubuntu-latest
    needs: pull_changes
    steps:
      - name: downcload files
        uses: actions/download-artifact@v4
        with:
          name: openclaw-source
          path: scan-target/
      - name: install tufflehog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin 
      - name: run trufflehog
        run: trufflehog git file://${{ github.workspace }}/scan-target --only-verified > secrets.txt
        continue-on-error: true
      - name: upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-scan-logs
          path: secrets.txt

  image_scan:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event.inputs.security_scan == 'image_scan' ||
      github.event.inputs.security_scan == 'all'
    runs-on: ubuntu-latest
    needs: pull_changes
    steps:
      - name: downcload files
        uses: actions/download-artifact@v4
        with:
          name: openclaw-source
          path: scan-target/
      - name: install trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
      - name: scan docker files
        run: |
          trivy config scan-target/Dockerfile > image-scan.txt
          trivy config scan-target/Dockerfile.sandbox >> image-scan.txt
          trivy config scan-target/Dockerfile.sandbox-browser >> image-scan.txt
          trivy config scan-target/Dockerfile.sandbox-common >> image-scan.txt
        continue-on-error: true
      - name: upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: image-scan-logs
          path: image-scan.txt